<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TableBot - Atlas Automations</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#b45309;--p2:#d97706;--r:#dc2626;--bg:#fdf8f0;--card:#fff;--dark:#1c0f00;--mid:#92400e;--border:#fde8c8;--soft:#fff8ee}
body{background:var(--bg);color:var(--dark);font-family:'Jost',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at top,rgba(212,163,56,.12),transparent 60%),radial-gradient(ellipse at bottom right,rgba(220,38,38,.07),transparent 60%),var(--bg)}
.wrap{position:relative;z-index:1;width:100%;max-width:470px}
.header{margin-bottom:20px;animation:up .6s ease}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.top{display:flex;align-items:center;gap:14px}
.icon{width:54px;height:54px;background:linear-gradient(135deg,var(--p),var(--p2));border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 10px 28px rgba(180,83,9,.35);flex-shrink:0}
.title h1{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--dark)}
.title p{font-size:11px;color:var(--mid);font-weight:500;letter-spacing:.8px;text-transform:uppercase;margin-top:2px}
.open{margin-left:auto;font-size:10px;font-weight:700;color:#fff;background:linear-gradient(135deg,var(--r),#ef4444);padding:5px 11px;border-radius:20px;flex-shrink:0}
.info{font-size:12px;color:var(--mid);font-weight:500;margin-top:8px;padding-left:68px}
.menu-btns{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.mb{background:#fff;border:1.5px solid var(--border);color:var(--mid);padding:5px 12px;border-radius:20px;font-size:11px;font-family:'Jost',sans-serif;cursor:pointer;transition:.2s;font-weight:500}
.mb:hover{border-color:var(--p);color:var(--p);background:var(--soft)}
.card{background:var(--card);border-radius:24px;overflow:hidden;box-shadow:0 20px 60px rgba(180,83,9,.1),0 1px 0 #fff inset;border:1px solid var(--border);animation:up .6s .1s ease both}
.msgs{height:370px;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.msg{display:flex;gap:10px;align-items:flex-end;animation:msgIn .25s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.av{width:32px;height:32px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.av-b{background:linear-gradient(135deg,var(--p),var(--p2));box-shadow:0 4px 12px rgba(180,83,9,.3)}
.av-u{background:linear-gradient(135deg,#0891b2,#38bdf8);box-shadow:0 4px 12px rgba(8,145,178,.3)}
.bubble{max-width:80%;padding:12px 16px;font-size:13.5px;line-height:1.7}
.bot .bubble{background:var(--soft);border:1px solid var(--border);border-radius:16px;border-bottom-left-radius:4px;color:var(--dark)}
.user .bubble{background:linear-gradient(135deg,var(--p),var(--p2));color:#fff;border-radius:16px;border-bottom-right-radius:4px}
.typing{display:flex;gap:5px;align-items:center;padding:2px 0}
.typing span{width:7px;height:7px;background:var(--p);border-radius:50%;animation:jump .7s infinite}
.typing span:nth-child(2){animation-delay:.15s}.typing span:nth-child(3){animation-delay:.3s}
@keyframes jump{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
.divider{height:1px;background:var(--border)}
.inp-row{padding:14px 18px;display:flex;gap:10px;align-items:center}
.inp-row input{flex:1;border:1.5px solid var(--border);border-radius:14px;padding:12px 16px;font-family:'Jost',sans-serif;font-size:13.5px;outline:none;transition:.25s;background:var(--soft);color:var(--dark)}
.inp-row input:focus{border-color:var(--p);background:#fff;box-shadow:0 0 0 3px rgba(180,83,9,.08)}
.inp-row input::placeholder{color:#e9b97a}
.sbtn{width:44px;height:44px;background:linear-gradient(135deg,var(--p),var(--p2));border:none;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;box-shadow:0 4px 14px rgba(180,83,9,.35)}
.sbtn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(180,83,9,.45)}
.sbtn svg{width:16px;height:16px;fill:#fff}
.footer{text-align:center;margin-top:14px;font-size:11px;color:#d4a46a;font-weight:500;animation:up .6s .2s ease both}
.footer b{color:var(--p)}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
  <div class="header">
    <div class="top">
      <div class="icon">🍽️</div>
      <div class="title"><h1>TableBot</h1><p>Restaurant AI · Atlas Automations</p></div>
      <div class="open">🍴 Open</div>
    </div>
    <div class="info">⏰ Daily 11:00 AM – 11:00 PM · Dine-in & Delivery</div>
    <div class="menu-btns">
      <button class="mb" onclick="q('I want to book a table')">📅 Reserve Table</button>
      <button class="mb" onclick="q('Show me the menu')">📜 View Menu</button>
      <button class="mb" onclick="q('Order food for delivery')">🛵 Delivery</button>
      <button class="mb" onclick="q('Vegetarian options please')">🥗 Vegetarian</button>
      <button class="mb" onclick="q('I want to plan a birthday dinner')">🎉 Events</button>
    </div>
  </div>
  <div class="card">
    <div class="msgs" id="msgs"></div>
    <div class="divider"></div>
    <div class="inp-row">
      <input id="inp" placeholder="Reserve a table, view menu, order food…" onkeydown="if(event.key==='Enter')send()">
      <button class="sbtn" onclick="send()"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg></button>
    </div>
  </div>
  <div class="footer">Powered by <b>Atlas Automations</b> · Serving excellence, digitally 🍷</div>
</div>
<script>
const KEY="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";
const SYS=`You are TableBot, a charming restaurant AI assistant by Atlas Automations for "Bella Vista Restaurant." Help guests with: table reservations (ask for date, time, party size — confirm with booking ref like "BV-4821"), menu (create realistic Nigerian/continental menu with prices in ₦, e.g. Jollof Rice ₦3,500, Grilled Fish ₦6,500, Pasta ₦4,000), food delivery orders, dietary requirements, event bookings for birthdays/anniversaries, and FAQs. Be warm, charming and make guests feel special. Keep responses 2-4 sentences.`;
let hist=[];
function addMsg(t,w){
  const m=document.getElementById('msgs');
  const d=document.createElement('div');d.className=`msg ${w}`;
  d.innerHTML=`<div class="av ${w==='bot'?'av-b':'av-u'}">${w==='bot'?'🍽️':'👤'}</div><div class="bubble">${t.replace(/\n/g,'<br>')}</div>`;
  m.appendChild(d);m.scrollTop=m.scrollHeight;
}
function showTyping(){
  const m=document.getElementById('msgs');const d=document.createElement('div');
  d.className='msg bot';d.id='typ';
  d.innerHTML=`<div class="av av-b">🍽️</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  m.appendChild(d);m.scrollTop=m.scrollHeight;
}
function hideTyping(){const t=document.getElementById('typ');if(t)t.remove();}
async function send(){
  const inp=document.getElementById('inp');const t=inp.value.trim();if(!t)return;inp.value='';
  addMsg(t,'user');hist.push({role:'user',content:t});showTyping();
  try{
    const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${KEY}`},
      body:JSON.stringify({model:'llama3-8b-8192',messages:[{role:'system',content:SYS},...hist],max_tokens:200,temperature:.75})
    });
    const d=await r.json();hideTyping();
    const rep=d.choices?.[0]?.message?.content||"My apologies! Please try again.";
    hist.push({role:'assistant',content:rep});addMsg(rep,'bot');
  }catch(e){hideTyping();addMsg("Apologies for the hiccup! Please try again.","bot");}
}
function q(t){document.getElementById('inp').value=t;send();}
setTimeout(()=>addMsg("Welcome to Bella Vista! 🍷 I'm TableBot, your personal dining assistant powered by Atlas Automations. I can help you reserve a table, explore our menu, place a delivery order, or plan a special occasion. How may I make your experience unforgettable today?","bot"),600);
</script>
</body>
</html>
