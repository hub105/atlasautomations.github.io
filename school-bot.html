<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduBot - Atlas Automations</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,800;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--p:#4f46e5;--p2:#818cf8;--g:#10b981;--bg:#f5f3ff;--card:#fff;--dark:#1e1b4b;--mid:#6366f1;--border:#e0e7ff;--soft:#eef2ff}
body{background:var(--bg);color:var(--dark);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.bg{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,rgba(79,70,229,.12),transparent 70%);top:-200px;right:-200px}
.bg::after{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,rgba(16,185,129,.1),transparent 70%);bottom:-100px;left:-100px}
.wrap{position:relative;z-index:1;width:100%;max-width:470px}
.header{margin-bottom:20px;animation:fadeUp .6s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.top{display:flex;align-items:center;gap:14px}
.icon{width:54px;height:54px;background:linear-gradient(135deg,var(--p),var(--p2));border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 10px 28px rgba(79,70,229,.35);flex-shrink:0}
.title h1{font-family:'Fraunces',serif;font-size:24px;font-weight:800;color:var(--dark)}
.title p{font-size:11px;color:var(--mid);font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-top:2px}
.online{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--g);background:rgba(16,185,129,.1);padding:5px 11px;border-radius:20px;flex-shrink:0}
.dot{width:6px;height:6px;background:var(--g);border-radius:50%;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.subjects{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.sub{background:#fff;border:1.5px solid var(--border);color:var(--mid);padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;transition:.2s}
.sub:hover{background:var(--p);color:#fff;border-color:var(--p)}
.card{background:var(--card);border-radius:24px;overflow:hidden;box-shadow:0 20px 60px rgba(79,70,229,.12),0 1px 0 #fff inset;border:1px solid var(--border);animation:fadeUp .6s .1s ease both}
.msgs{height:380px;overflow-y:auto;padding:22px;display:flex;flex-direction:column;gap:14px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.msg{display:flex;gap:10px;align-items:flex-end;animation:msgIn .25s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse}
.av{width:32px;height:32px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.av-b{background:linear-gradient(135deg,var(--p),var(--p2));box-shadow:0 4px 12px rgba(79,70,229,.3)}
.av-u{background:linear-gradient(135deg,#f59e0b,#fbbf24);box-shadow:0 4px 12px rgba(245,158,11,.3)}
.bubble{max-width:80%;padding:12px 16px;font-size:13.5px;line-height:1.7;font-weight:400}
.bot .bubble{background:var(--soft);border:1px solid var(--border);border-radius:16px;border-bottom-left-radius:4px;color:var(--dark)}
.user .bubble{background:linear-gradient(135deg,var(--p),#6366f1);color:#fff;border-radius:16px;border-bottom-right-radius:4px}
.typing{display:flex;gap:5px;align-items:center;padding:2px 0}
.typing span{width:7px;height:7px;background:var(--p);border-radius:50%;animation:jump .7s infinite}
.typing span:nth-child(2){animation-delay:.15s}.typing span:nth-child(3){animation-delay:.3s}
@keyframes jump{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-8px)}}
.divider{height:1px;background:var(--border);margin:0 20px}
.inp-row{padding:14px 18px;display:flex;gap:10px;align-items:center}
.inp-row input{flex:1;border:1.5px solid var(--border);border-radius:14px;padding:12px 16px;font-family:'DM Sans',sans-serif;font-size:13.5px;outline:none;transition:.25s;background:var(--soft);color:var(--dark)}
.inp-row input:focus{border-color:var(--p);background:#fff;box-shadow:0 0 0 3px rgba(79,70,229,.1)}
.inp-row input::placeholder{color:#a5b4fc}
.sbtn{width:44px;height:44px;background:linear-gradient(135deg,var(--p),#6366f1);border:none;border-radius:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.2s;box-shadow:0 4px 14px rgba(79,70,229,.35)}
.sbtn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(79,70,229,.45)}
.sbtn svg{width:16px;height:16px;fill:#fff}
.footer{text-align:center;margin-top:14px;font-size:11px;color:#a5b4fc;font-weight:500;letter-spacing:.3px;animation:fadeUp .6s .2s ease both}
.footer b{color:var(--p)}
</style>
</head>
<body>
<div class="bg"></div>
<div class="wrap">
  <div class="header">
    <div class="top">
      <div class="icon">🎓</div>
      <div class="title"><h1>EduBot</h1><p>AI School Assistant · Atlas Automations</p></div>
      <div class="online"><div class="dot"></div>Online</div>
    </div>
    <div class="subjects">
      <button class="sub" onclick="q('Explain photosynthesis')">🌱 Biology</button>
      <button class="sub" onclick="q('Help me solve algebra')">📐 Maths</button>
      <button class="sub" onclick="q('Help with my essay')">✍️ English</button>
      <button class="sub" onclick="q('Explain Newton laws')">⚡ Physics</button>
      <button class="sub" onclick="q('Tell me about World War 2')">🌍 History</button>
      <button class="sub" onclick="q('Help with chemistry')">🧪 Chemistry</button>
    </div>
  </div>
  <div class="card">
    <div class="msgs" id="msgs"></div>
    <div class="divider"></div>
    <div class="inp-row">
      <input id="inp" placeholder="Ask any subject question…" onkeydown="if(event.key==='Enter')send()">
      <button class="sbtn" onclick="send()"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg></button>
    </div>
  </div>
  <div class="footer">Powered by <b>Atlas Automations</b> · Helping every student succeed 🚀</div>
</div>
<script>
const KEY="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";
const SYS=`You are EduBot, a brilliant and encouraging AI school tutor by Atlas Automations. You help students with any subject: mathematics, science, English, history, geography, coding, and more. Always explain clearly with examples and steps. Make learning fun and never make students feel dumb. For maths always show working steps. Keep answers clear and to the point (max 4 sentences or numbered steps). Always end by encouraging the student.`;
let hist=[];
function addMsg(t,w){
  const m=document.getElementById('msgs');
  const d=document.createElement('div');d.className=`msg ${w}`;
  d.innerHTML=`<div class="av ${w==='bot'?'av-b':'av-u'}">${w==='bot'?'🎓':'😊'}</div><div class="bubble">${t.replace(/\n/g,'<br>')}</div>`;
  m.appendChild(d);m.scrollTop=m.scrollHeight;
}
function showTyping(){
  const m=document.getElementById('msgs');const d=document.createElement('div');
  d.className='msg bot';d.id='typ';
  d.innerHTML=`<div class="av av-b">🎓</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
  m.appendChild(d);m.scrollTop=m.scrollHeight;
}
function hideTyping(){const t=document.getElementById('typ');if(t)t.remove();}
async function send(){
  const inp=document.getElementById('inp');const t=inp.value.trim();if(!t)return;inp.value='';
  addMsg(t,'user');hist.push({role:'user',content:t});showTyping();
  try{
    const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${KEY}`},
      body:JSON.stringify({model:'llama3-8b-8192',messages:[{role:'system',content:SYS},...hist],max_tokens:300,temperature:.7})
    });
    const d=await r.json();hideTyping();
    const rep=d.choices?.[0]?.message?.content||"Sorry, I had a little hiccup! Try again.";
    hist.push({role:'assistant',content:rep});addMsg(rep,'bot');
  }catch(e){hideTyping();addMsg("Oops! Something went wrong. Please try again!","bot");}
}
function q(t){document.getElementById('inp').value=t;send();}
setTimeout(()=>addMsg("Hey there! 👋 I'm EduBot, your personal AI study buddy powered by Atlas Automations! I can help you with any subject — maths, science, English, history, and more. What are we learning today? 📚","bot"),600);
</script>
</body>
</html>
